<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trekking Management Application</title>

    <!-- Bootstrap (only allowed CSS framework) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Vue 3 + Vue Router + axios (CDN, no build step) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        .tma-modal-backdrop {
            position: fixed; inset: 0; background: rgba(0, 0, 0, .5);
            display: flex; align-items: flex-start; justify-content: center;
            padding: 3rem 1rem; z-index: 1050; overflow-y: auto;
        }
        .tma-modal { width: 100%; max-width: 640px; }
    </style>
</head>
<body class="bg-light">
    <div id="app"></div>

    <!-- App scripts (order matters: store -> pages -> router -> app) -->
    <script src="/static/js/store.js"></script>
    <script src="/static/js/pages/Login.js"></script>
    <script src="/static/js/pages/Register.js"></script>
    <script src="/static/js/pages/AdminDashboard.js"></script>
    <script src="/static/js/pages/StaffDashboard.js"></script>
    <script src="/static/js/pages/TrekkerDashboard.js"></script>
    <script src="/static/js/router.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
