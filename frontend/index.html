<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manzil - Trekking Management Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <style>
        .tma-modal-backdrop {
            position: fixed; inset: 0; background: rgba(0, 0, 0, .5);
            display: flex; align-items: flex-start; justify-content: center;
            padding: 3rem 1rem; z-index: 1050; overflow-y: auto;
        }
        .tma-modal { width: 100%; max-width: 640px; }

        .auth-wrap {
            min-height: calc(100vh - 120px);
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            width: 100%; max-width: 900px; overflow: hidden;
            border: none; border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, .18);
        }
        
        .auth-collage {
            background: linear-gradient(135deg, #2f6b4f, #1c3d5a);
            display: grid; grid-template-columns: 1fr 1fr;
            grid-auto-rows: 1fr; gap: 3px; min-height: 460px;
        }
        .auth-collage img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            min-height: 150px;
        }
        .auth-form-side { padding: 2.5rem; }

        /* Brand overlay on the photo collage */
        .auth-media { position: relative; }
        .auth-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(18,38,28,.15), rgba(14,28,44,.80));
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 2rem; color: #fff;
        }
        .auth-overlay .brand { font-size: 2.6rem; font-weight: 700; letter-spacing: 1px; margin: 0; }
        .auth-overlay .brand-sub {
            text-transform: uppercase; letter-spacing: 3px;
            font-size: .78rem; opacity: .9; margin: .25rem 0 .9rem;
        }
        .auth-overlay .brand-quote { font-style: italic; opacity: .95; margin: 0; font-size: .95rem; }

        /* Feature highlights (inline SVG icons — no emoji, no icon library) */
        .auth-features .feat { padding: .5rem .25rem; }
        .auth-features .feat svg { width: 26px; height: 26px; color: #2f6b4f; }
        .auth-features .feat-label { font-size: .74rem; color: #555; margin-top: .35rem; display: block; }

        /* Navbar mini logo */
        .brand-logo { width: 22px; height: 22px; vertical-align: -4px; margin-right: 6px; }
    </style>
</head>
<body class="bg-light">
    <div id="app"></div>

    <script src="/static/src/store.js"></script>
    <script src="/static/components/Login.js"></script>
    <script src="/static/components/Register.js"></script>
    <script src="/static/components/AdminDashboard.js"></script>
    <script src="/static/components/StaffDashboard.js"></script>
    <script src="/static/components/TrekkerDashboard.js"></script>
    <script src="/static/src/router.js"></script>
    <script src="/static/src/app.js"></script>
</body>
</html>
